version: 2
updates:
  # Rust workspace dependencies.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  # VS Code extension (npm) dependencies.
  - package-ecosystem: npm
    directory: "/extensions/vscode"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # @types/vscode must not exceed engines.vscode (vsce fails the
      # package step otherwise). Bump it manually together with
      # engines.vscode when raising the minimum supported VS Code.
      - dependency-name: "@types/vscode"

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
