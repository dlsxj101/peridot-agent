name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }} -p peridot-cli
          else
            cargo build --release --target ${{ matrix.target }} -p peridot-cli
          fi

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          ext=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            ext=".exe"
          fi
          cp "target/${{ matrix.target }}/release/peridot${ext}" "dist/peridot${ext}"
          tar -C dist -czf "peridot-${{ matrix.target }}.tar.gz" "peridot${ext}"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            powershell -NoProfile -Command "Compress-Archive -Path dist/peridot${ext} -DestinationPath peridot-${{ matrix.target }}.zip -Force"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: peridot-${{ matrix.target }}
          path: peridot-${{ matrix.target }}.*

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums and Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          sh -n install.sh
          bash -n install.sh
          cp install.sh dist/install.sh
          cd dist
          sha256sum peridot-* > SHA256SUMS
          version="${GITHUB_REF_NAME#v}"
          repo="${GITHUB_REPOSITORY}"
          release_url="https://github.com/${repo}/releases/download/${GITHUB_REF_NAME}"
          sha_linux_x64="$(sha256sum peridot-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')"
          sha_linux_arm="$(sha256sum peridot-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')"
          sha_macos_x64="$(sha256sum peridot-x86_64-apple-darwin.tar.gz | awk '{print $1}')"
          sha_macos_arm="$(sha256sum peridot-aarch64-apple-darwin.tar.gz | awk '{print $1}')"
          cat > peridot.rb <<FORMULA
          class Peridot < Formula
            desc "Rust CLI/TUI autonomous coding agent"
            homepage "https://github.com/${repo}"
            version "${version}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${release_url}/peridot-aarch64-apple-darwin.tar.gz"
                sha256 "${sha_macos_arm}"
              else
                url "${release_url}/peridot-x86_64-apple-darwin.tar.gz"
                sha256 "${sha_macos_x64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${release_url}/peridot-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_linux_arm}"
              else
                url "${release_url}/peridot-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_linux_x64}"
              end
            end

            def install
              bin.install "peridot"
              bin.install_symlink "peridot" => "peri"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/peridot --version")
            end
          end
          FORMULA

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
            dist/peridot.rb
            dist/install.sh
