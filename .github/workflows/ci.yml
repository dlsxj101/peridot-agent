name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * 1"

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Installer syntax
        run: |
          sh -n install.sh
          bash -n install.sh

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Rust dependency advisories (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extension npm audit (production deps)
        working-directory: extensions/vscode
        run: npm audit --omit=dev --audit-level=high

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: E2E tests
        run: cargo test --workspace --locked --features e2e
