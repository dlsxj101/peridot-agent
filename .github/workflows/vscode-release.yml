name: VSCode Release

on:
  push:
    tags:
      # Tag format keeps Rust release ('v*') and extension release
      # ('vsce/v*') separate so each pipeline only fires for its own
      # artefacts.
      - "vsce/v*"

env:
  NODE_OPTIONS: --no-deprecation

jobs:
  verify-secrets:
    name: Verify publish secrets present
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "::error::VSCE_PAT repository secret is not set"
            exit 1
          fi
          if [ -z "${OVSX_PAT}" ]; then
            echo "::error::OVSX_PAT repository secret is not set"
            exit 1
          fi
          echo "Both VSCE_PAT and OVSX_PAT are configured."

  build-binary:
    name: Build peridot (${{ matrix.vsce-target }})
    needs: verify-secrets
    runs-on: ${{ matrix.os }}
    strategy:
      # Every advertised platform must succeed before any publish runs —
      # a partial release leaves users on the missing target seeing
      # "no compatible version" in the Marketplace.
      fail-fast: true
      matrix:
        include:
          - vsce-target: linux-x64
            cargo-target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            exe: ""
          - vsce-target: linux-arm64
            cargo-target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            exe: ""
            use-cross: true
          - vsce-target: darwin-x64
            cargo-target: x86_64-apple-darwin
            os: macos-latest
            exe: ""
          - vsce-target: darwin-arm64
            cargo-target: aarch64-apple-darwin
            os: macos-latest
            exe: ""
          - vsce-target: win32-x64
            cargo-target: x86_64-pc-windows-msvc
            os: windows-latest
            exe: ".exe"
          - vsce-target: win32-arm64
            cargo-target: aarch64-pc-windows-msvc
            os: windows-latest
            exe: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo-target }}

      - name: Install cross
        if: matrix.use-cross == true
        run: cargo install cross --locked

      - name: Build peridot-cli
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.cargo-target }} -p peridot-cli
          else
            cargo build --release --target ${{ matrix.cargo-target }} -p peridot-cli
          fi

      - name: Stage binary for upload
        shell: bash
        run: |
          mkdir -p staging
          cp "target/${{ matrix.cargo-target }}/release/peridot${{ matrix.exe }}" "staging/peridot${{ matrix.exe }}"

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: peridot-${{ matrix.vsce-target }}
          path: staging/peridot${{ matrix.exe }}
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish ${{ matrix.vsce-target }}
    needs: build-binary
    runs-on: ubuntu-latest
    strategy:
      # One publish job per platform — same .vsix build, different
      # `resources/peridot[.exe]` swapped in before `vsce package
      # --target`. `fail-fast: false` so a single platform's Marketplace
      # error doesn't block the others (we still want partial users to
      # receive their build).
      fail-fast: false
      matrix:
        include:
          - vsce-target: linux-x64
            exe: ""
          - vsce-target: linux-arm64
            exe: ""
          - vsce-target: darwin-x64
            exe: ""
          - vsce-target: darwin-arm64
            exe: ""
          - vsce-target: win32-x64
            exe: ".exe"
          - vsce-target: win32-arm64
            exe: ".exe"
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Download peridot binary
        # `path` is GITHUB_WORKSPACE-relative; downstream `run:` steps
        # execute from `extensions/vscode/` via `defaults.run.working-directory`,
        # so they reference the binary as `resources/peridot[.exe]`.
        uses: actions/download-artifact@v8
        with:
          name: peridot-${{ matrix.vsce-target }}
          path: extensions/vscode/resources

      - name: Mark binary executable
        if: matrix.exe == ''
        run: chmod +x resources/peridot

      - name: Install
        run: npm ci || npm install

      - name: Compile (production)
        run: npm run build:prod

      - name: Package platform .vsix
        run: npx vsce package --target ${{ matrix.vsce-target }} --no-dependencies

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        # The `.vsix` produced above is already tagged for one platform,
        # so we pass --packagePath rather than re-packaging. The
        # git tag and `package.json` version are expected to match;
        # mismatched uploads are rejected by the Marketplace.
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            set +e
            output="$(npx vsce publish --packagePath *.vsix --no-dependencies -p "$VSCE_PAT" 2>&1)"
            status=$?
            set -e
            echo "$output"
            if [ "$status" -eq 0 ]; then
              exit 0
            fi
            if echo "$output" | grep -Eiq 'already (exists|published)|version .*already|duplicate'; then
              echo "Marketplace reports this package is already published; treating as success."
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit "$status"
            fi
            sleep 60
          done

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: peridot-vscode-${{ matrix.vsce-target }}-vsix
          path: extensions/vscode/*.vsix
          if-no-files-found: error
          retention-days: 1

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        # ovsx reads the same .vsix produced above. Namespace must
        # already exist (`ovsx create-namespace dlsxj101 -p <pat>`
        # was a one-time setup step). Open VSX occasionally returns
        # transient 503s, so retry before failing the release.
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            set +e
            output="$(npx ovsx publish *.vsix -p "$OVSX_PAT" 2>&1)"
            status=$?
            set -e
            echo "$output"
            if [ "$status" -eq 0 ]; then
              exit 0
            fi
            if echo "$output" | grep -Eiq 'already (exists|published)|version .*already|duplicate'; then
              echo "Open VSX reports this package is already published; treating as success."
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit "$status"
            fi
            sleep 30
          done

  publish-universal:
    name: Publish universal
    needs: build-binary
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Download all peridot binaries
        uses: actions/download-artifact@v8
        with:
          pattern: peridot-*
          path: extensions/vscode/resources/bin-raw

      - name: Stage universal binary layout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p \
            resources/bin/linux-x64 \
            resources/bin/linux-arm64 \
            resources/bin/darwin-x64 \
            resources/bin/darwin-arm64 \
            resources/bin/win32-x64 \
            resources/bin/win32-arm64
          cp resources/bin-raw/peridot-linux-x64/peridot resources/bin/linux-x64/peridot
          cp resources/bin-raw/peridot-linux-arm64/peridot resources/bin/linux-arm64/peridot
          cp resources/bin-raw/peridot-darwin-x64/peridot resources/bin/darwin-x64/peridot
          cp resources/bin-raw/peridot-darwin-arm64/peridot resources/bin/darwin-arm64/peridot
          cp resources/bin-raw/peridot-win32-x64/peridot.exe resources/bin/win32-x64/peridot.exe
          cp resources/bin-raw/peridot-win32-arm64/peridot.exe resources/bin/win32-arm64/peridot.exe
          chmod +x resources/bin/linux-x64/peridot \
            resources/bin/linux-arm64/peridot \
            resources/bin/darwin-x64/peridot \
            resources/bin/darwin-arm64/peridot
          rm -rf resources/bin-raw

      - name: Install
        run: npm ci || npm install

      - name: Compile (production)
        run: npm run build:prod

      - name: Package universal .vsix
        run: npx vsce package --no-dependencies

      - name: Publish universal to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            set +e
            output="$(npx vsce publish --packagePath *.vsix --no-dependencies -p "$VSCE_PAT" 2>&1)"
            status=$?
            set -e
            echo "$output"
            if [ "$status" -eq 0 ]; then
              exit 0
            fi
            if echo "$output" | grep -Eiq 'already (exists|published)|version .*already|duplicate'; then
              echo "Marketplace reports this package is already published; treating as success."
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit "$status"
            fi
            sleep 60
          done

      - name: Upload universal .vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: peridot-vscode-universal-vsix
          path: extensions/vscode/*.vsix
          if-no-files-found: error
          retention-days: 1

      - name: Publish universal to Open VSX
        continue-on-error: true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        # Open VSX can intermittently disconnect on the large universal
        # package. Platform-specific Open VSX publishes remain blocking;
        # the universal fallback is still published to VS Code Marketplace
        # and attached to the GitHub Release.
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            set +e
            output="$(npx ovsx publish *.vsix -p "$OVSX_PAT" 2>&1)"
            status=$?
            set -e
            echo "$output"
            if [ "$status" -eq 0 ]; then
              exit 0
            fi
            if echo "$output" | grep -Eiq 'already (exists|published)|version .*already|duplicate'; then
              echo "Open VSX reports this package is already published; treating as success."
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit "$status"
            fi
            sleep 30
          done

  publish-release-assets:
    name: Upload VSIX assets to GitHub Release
    needs:
      - publish
      - publish-universal
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged VSIX artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: peridot-vscode-*-vsix
          path: vsix-assets
          merge-multiple: true

      - name: Upload .vsix files to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: vsix-assets/*.vsix
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
