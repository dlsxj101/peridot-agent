# Project-local Peridot development hooks.
# Keep this file minimal so future product config can grow without conflict.

[[hooks.tool]]
event = "pre:git_commit"
run = ".peridot/hooks/pre-git-commit-quality.sh"
description = "Run Rust formatting, clippy, and tests before commits when a workspace exists."
on_failure = "block"

[[hooks.tool]]
event = "post:file_write"
run = ".peridot/hooks/post-file-write-rust-check.sh {path}"
description = "Run an advisory Rust workspace check after Rust file writes."
on_failure = "warn"

[[hooks.tool]]
event = "pre:shell_exec"
run = ".peridot/hooks/pre-shell-dangerous-command.sh {command}"
description = "Record dangerous shell command patterns for audit and future blocking."
on_failure = "warn"

[[hooks.event]]
event = "verification_failed"
run = ".peridot/hooks/on-verification-failed.sh {stage} {output}"
description = "Save a short verification failure summary for handoff and recovery."
on_failure = "warn"

[[hooks.lifecycle]]
event = "session_end"
run = ".peridot/hooks/on-session-end.sh {session_id} {status} {summary}"
description = "Write the latest session handoff note."
on_failure = "ignore"
